services:
  grabia:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - grabia-data:/app/data
      - ./downloads:/app/downloads
      - ./processed:/app/processed
      - grabia-temp:/tempstorage
    environment:
      - GRABIA_PORT=5000
    restart: unless-stopped

volumes:
  grabia-data:
  grabia-temp:
